<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scene Editor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #141414;
        color: #d0d0d0;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Toolbar ──────────────────────────────────────────────── */
      #toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: #1e1e1e;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }

      #toolbar .title {
        font-weight: bold;
        color: #888;
        margin-right: 4px;
      }

      #toolbar select,
      #toolbar button {
        background: #2a2a2a;
        border: 1px solid #444;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
      }

      #toolbar button:hover { background: #363636; }
      #toolbar button:active { background: #1a1a1a; }

      #dirty-indicator {
        color: #e06c4a;
        font-size: 12px;
        margin-left: 4px;
      }

      .sep { color: #444; margin: 0 2px; }

      .mode-btn { opacity: 0.55; }
      .mode-btn.active { opacity: 1; border-color: #6a9fd8; color: #9fc8f0; }

      /* ── New scene dialog ─────────────────────────────────────── */
      #new-scene-dialog {
        background: #1e1e1e;
        border: 1px solid #444;
        border-radius: 6px;
        color: #d0d0d0;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 13px;
        padding: 0;
        min-width: 300px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      }

      #new-scene-dialog::backdrop { background: rgba(0,0,0,0.55); }

      .dialog-header {
        padding: 14px 16px 10px;
        font-weight: bold;
        color: #aaa;
        border-bottom: 1px solid #333;
      }

      .dialog-body {
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .dialog-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .dialog-field label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .dialog-field input {
        background: #141414;
        border: 1px solid #444;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 13px;
        padding: 5px 8px;
        border-radius: 3px;
      }

      .dialog-field input:focus {
        outline: none;
        border-color: #6a9fd8;
      }

      .dialog-dims {
        display: flex;
        gap: 8px;
      }

      .dialog-dims .dialog-field { flex: 1; }

      .dialog-error {
        font-size: 12px;
        color: #e06c4a;
        background: #2a1a14;
        border: 1px solid #5a2a18;
        border-radius: 3px;
        padding: 5px 8px;
      }

      .dialog-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 10px 16px 14px;
        border-top: 1px solid #333;
      }

      .dialog-footer button {
        background: #2a2a2a;
        border: 1px solid #444;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 12px;
        padding: 5px 16px;
        border-radius: 3px;
        cursor: pointer;
      }

      .dialog-footer button:hover { background: #363636; }

      #ns-confirm {
        background: #1a3a5a;
        border-color: #2a6aaa;
        color: #9fc8f0;
      }

      #ns-confirm:hover { background: #1e4a74; }

      /* ── Main area ────────────────────────────────────────────── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Canvas area ──────────────────────────────────────────── */
      #canvas-wrap {
        flex: 1;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 12px;
        overflow: auto;
        background: #141414;
      }

      canvas {
        display: block;
        cursor: crosshair;
        image-rendering: pixelated;
      }

      /* ── Palette ──────────────────────────────────────────────── */
      #palette {
        width: 152px;
        flex-shrink: 0;
        background: #1e1e1e;
        border-left: 1px solid #333;
        padding: 10px 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        overflow-y: auto;
      }

      #palette .section-label {
        color: #666;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .tile-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #c0c0c0;
        font-family: inherit;
        font-size: 12px;
        padding: 5px 8px;
        border-radius: 3px;
        cursor: pointer;
        text-align: left;
        width: 100%;
      }

      .tile-btn:hover { background: #333; border-color: #555; }

      .tile-btn.active {
        border-color: #6a9fd8;
        color: #fff;
        background: #2a3a4a;
      }

      .swatch {
        width: 14px;
        height: 14px;
        border-radius: 2px;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.15);
      }

      /* ── Spawn panel ──────────────────────────────────────────── */
      .spawn-add-btn { margin-bottom: 4px; }

      .spawn-hint {
        font-size: 11px;
        color: #f0a060;
        padding: 4px 6px;
        background: #2a1e10;
        border: 1px solid #6a3a10;
        border-radius: 3px;
        margin-bottom: 4px;
      }

      .spawn-item {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 3px;
        padding: 4px 6px;
        cursor: pointer;
      }
      .spawn-item:hover { background: #333; }
      .spawn-item.active { border-color: #f0a060; background: #2a1e10; }

      .spawn-name {
        flex: 1;
        color: #c0c0c0;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .spawn-item.active .spawn-name { color: #f0c080; }

      .spawn-coords {
        font-size: 10px;
        color: #666;
        flex-shrink: 0;
      }

      .spawn-del {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 11px;
        padding: 0 2px;
        flex-shrink: 0;
        line-height: 1;
        border-radius: 2px;
      }
      .spawn-del:hover { color: #e06c4a; background: #3a2020; }

      .spawn-rename-input {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #6a9fd8;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 12px;
        padding: 1px 4px;
        border-radius: 2px;
        min-width: 0;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <span class="title">Scene Editor</span>
      <select id="scene-select">
        <option value="">— select scene —</option>
      </select>
      <button id="load-btn">Load</button>
      <button id="new-scene-btn">+ New</button>
      <button id="resize-btn">Resize</button>
      <button id="save-btn">Save</button>
      <span id="dirty-indicator" hidden>● unsaved</span>
      <span class="sep">|</span>
      <button id="mode-paint" class="mode-btn active">Paint</button>
      <button id="mode-spawn" class="mode-btn">Spawn</button>
    </div>

    <div id="main">
      <div id="canvas-wrap">
        <canvas id="grid"></canvas>
      </div>
      <div id="palette">
        <div class="section-label">Tiles</div>
      </div>
    </div>

    <dialog id="resize-dialog">
      <div class="dialog-header">Resize Scene</div>
      <div class="dialog-body">
        <div class="dialog-dims">
          <div class="dialog-field">
            <label for="rs-width">Width (tiles)</label>
            <input id="rs-width" type="number" min="4" max="200" />
          </div>
          <div class="dialog-field">
            <label for="rs-height">Height (tiles)</label>
            <input id="rs-height" type="number" min="4" max="200" />
          </div>
        </div>
        <div id="rs-error" class="dialog-error" hidden></div>
      </div>
      <div class="dialog-footer">
        <button id="rs-cancel">Cancel</button>
        <button id="rs-confirm">Resize</button>
      </div>
    </dialog>

    <dialog id="new-scene-dialog">
      <div class="dialog-header">New Scene</div>
      <div class="dialog-body">
        <div class="dialog-field">
          <label for="ns-name">Scene name</label>
          <input id="ns-name" type="text" placeholder="dungeon" autocomplete="off" spellcheck="false" />
        </div>
        <div class="dialog-dims">
          <div class="dialog-field">
            <label for="ns-width">Width (tiles)</label>
            <input id="ns-width" type="number" value="20" min="4" max="200" />
          </div>
          <div class="dialog-field">
            <label for="ns-height">Height (tiles)</label>
            <input id="ns-height" type="number" value="15" min="4" max="200" />
          </div>
        </div>
        <div id="ns-error" class="dialog-error" hidden></div>
      </div>
      <div class="dialog-footer">
        <button id="ns-cancel">Cancel</button>
        <button id="ns-confirm">Create</button>
      </div>
    </dialog>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
