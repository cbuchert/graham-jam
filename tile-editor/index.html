<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tile Editor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /*
       * CSS convention — NO specificity wars.
       *
       * Rules:
       * - Style every element through its own class, never via a parent selector.
       * - Flat, single-class selectors for base styles.
       * - BEM modifier classes (.block--modifier) for variants.
       * - Parent context (.parent .child) only for layout adjustments — never
       *   for colour, typography, or borders.
       * - Bare element selectors only in the global reset above.
       */

      body {
        background: #141414;
        color: #d0d0d0;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Toolbar ───────────────────────────────────────────────── */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: #1e1e1e;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }

      .toolbar__title {
        font-weight: bold;
        color: #888;
        margin-right: 4px;
      }

      .toolbar__btn {
        background: #2a2a2a;
        border: 1px solid #444;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
      }

      .toolbar__btn:hover  { background: #363636; }
      .toolbar__btn:active { background: #1a1a1a; }

      .toolbar__zoom-label {
        font-size: 12px;
        color: #888;
        min-width: 32px;
        text-align: center;
      }

      .toolbar__sep { color: #444; margin: 0 2px; }

      /* ── Main layout ───────────────────────────────────────────── */
      .editor-main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Terrain sidebar (left) ────────────────────────────────── */
      .terrain-sidebar {
        width: 144px;
        flex-shrink: 0;
        background: #1e1e1e;
        border-right: 1px solid #333;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .sidebar__label {
        color: #666;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 8px 10px 4px;
        flex-shrink: 0;
      }

      .terrain-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        border-bottom: 1px solid #252525;
        color: #aaa;
        font-family: inherit;
        font-size: 12px;
        padding: 5px 6px 5px 10px;
        cursor: pointer;
        text-align: left;
        width: 100%;
      }

      .terrain-btn:hover { background: #242424; color: #d0d0d0; }

      .terrain-btn__name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

      .terrain-btn__icon {
        background: none;
        border: none;
        color: #555;
        font-size: 11px;
        padding: 1px 3px;
        cursor: pointer;
        border-radius: 2px;
        flex-shrink: 0;
        line-height: 1;
        display: none;
      }

      .terrain-btn:hover .terrain-btn__icon { display: block; }
      .terrain-btn--active .terrain-btn__icon { display: block; }
      .terrain-btn__icon:hover { background: #3a3a3a; color: #d0d0d0; }
      .terrain-btn__icon--del:hover { color: #e06c4a; background: #3a2020; }

      .terrain-btn__rename-input {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #4a8fd0;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 12px;
        padding: 1px 4px;
        border-radius: 2px;
        min-width: 0;
      }

      .terrain-sidebar__footer {
        padding: 8px;
        border-top: 1px solid #2a2a2a;
        flex-shrink: 0;
        margin-top: auto;
      }

      .terrain-sidebar__add-btn {
        width: 100%;
        background: #242424;
        border: 1px solid #333;
        color: #888;
        font-family: inherit;
        font-size: 12px;
        padding: 5px;
        border-radius: 3px;
        cursor: pointer;
      }

      .terrain-sidebar__add-btn:hover { color: #d0d0d0; background: #2e2e2e; }

      .terrain-sidebar__msg {
        font-size: 11px;
        padding: 4px 6px;
        border-radius: 3px;
        margin-bottom: 4px;
      }

      .terrain-sidebar__msg--error {
        color: #e06c4a;
        background: #2a1a14;
        border: 1px solid #5a2a18;
      }

      /* ── Dialogs ─────────────────────────────────────────────── */
      .editor-dialog {
        background: #1e1e1e;
        border: 1px solid #444;
        border-radius: 6px;
        color: #d0d0d0;
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 13px;
        padding: 0;
        min-width: 280px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      }

      .editor-dialog::backdrop { background: rgba(0,0,0,0.55); }

      .dialog__header {
        padding: 12px 16px 8px;
        font-weight: bold;
        color: #aaa;
        border-bottom: 1px solid #333;
      }

      .dialog__body {
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .dialog__field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .dialog__label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .dialog__input {
        background: #141414;
        border: 1px solid #444;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 13px;
        padding: 5px 8px;
        border-radius: 3px;
      }

      .dialog__input:focus { outline: none; border-color: #4a8fd0; }

      .dialog__row { display: flex; align-items: center; gap: 8px; }

      .dialog__error {
        font-size: 12px;
        color: #e06c4a;
        background: #2a1a14;
        border: 1px solid #5a2a18;
        border-radius: 3px;
        padding: 5px 8px;
      }

      .dialog__footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 8px 16px 12px;
        border-top: 1px solid #333;
      }

      .dialog__btn {
        background: #2a2a2a;
        border: 1px solid #444;
        color: #d0d0d0;
        font-family: inherit;
        font-size: 12px;
        padding: 5px 16px;
        border-radius: 3px;
        cursor: pointer;
      }

      .dialog__btn:hover { background: #363636; }

      .dialog__btn--primary {
        background: #1a3a5a;
        border-color: #2a6aaa;
        color: #9fc8f0;
      }

      .dialog__btn--primary:hover { background: #1e4a74; }

      .terrain-btn--active {
        background: #1a2a3a;
        color: #9fc8f0;
        border-left: 2px solid #4a8fd0;
      }

      .terrain-btn__swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.12);
      }

      .terrain-btn--active .terrain-btn__swatch { border-color: rgba(159,200,240,0.3); }

      /* ── Canvas area (center) ──────────────────────────────────── */
      .canvas-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #141414;
      }

      .canvas-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: auto;
        padding: 20px;
      }

      .canvas-wrap__canvas {
        display: block;
        cursor: crosshair;
        image-rendering: pixelated;
        /* checkerboard for transparency */
        background-image:
          linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
          linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
          linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
        background-size: 8px 8px;
        background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
        background-color: #2a2a2a;
      }

      .canvas-empty {
        color: #555;
        font-size: 13px;
        text-align: center;
      }

      /* ── Right sidebar ─────────────────────────────────────────── */
      .right-sidebar {
        width: 204px;
        flex-shrink: 0;
        background: #1e1e1e;
        border-left: 1px solid #333;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .sidebar__section {
        border-bottom: 1px solid #2a2a2a;
        padding: 8px;
      }

      /* ── Variant panel ─────────────────────────────────────────── */
      .frame-actions {
        display: flex;
        gap: 4px;
        margin-bottom: 6px;
      }

      .frame-action-btn {
        flex: 1;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #aaa;
        font-family: inherit;
        font-size: 11px;
        padding: 3px 6px;
        border-radius: 3px;
        cursor: pointer;
      }

      .frame-action-btn:hover { background: #333; color: #d0d0d0; }

      .frame-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .frame-slot {
        position: relative;
        width: 36px;
        height: 36px;
        border: 1px solid #3a3a3a;
        border-radius: 3px;
        cursor: pointer;
        overflow: hidden;
        background-color: #2a2a2a;
        background-image:
          linear-gradient(45deg, #333 25%, transparent 25%),
          linear-gradient(-45deg, #333 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #333 75%),
          linear-gradient(-45deg, transparent 75%, #333 75%);
        background-size: 6px 6px;
        background-position: 0 0, 0 3px, 3px -3px, -3px 0px;
      }

      .frame-slot:hover { border-color: #555; }

      .frame-slot--active { border-color: #4a8fd0; box-shadow: 0 0 0 1px #4a8fd0; }

      .frame-slot__canvas {
        display: block;
        width: 34px;
        height: 34px;
        image-rendering: pixelated;
      }

      .frame-slot__del {
        position: absolute;
        top: 1px;
        right: 1px;
        background: rgba(20,20,20,0.8);
        border: none;
        color: #888;
        font-size: 9px;
        width: 12px;
        height: 12px;
        border-radius: 2px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        line-height: 1;
        padding: 0;
      }

      .frame-slot:hover .frame-slot__del { display: flex; }
      .frame-slot__del:hover { color: #e06c4a; background: rgba(40,10,5,0.9); }

      /* ── Colour picker ─────────────────────────────────────────── */
      .colour-preview {
        width: 100%;
        height: 28px;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.08);
        margin-bottom: 8px;
        cursor: pointer;
        position: relative;
      }

      .colour-preview:hover { border-color: rgba(255,255,255,0.25); }

      /* hidden input used only to open the OS colour picker on click */
      .colour-preview__picker {
        position: absolute;
        inset: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        border: none;
        padding: 0;
      }

      .colour-field {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 6px;
      }

      .colour-field__row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .colour-field__label {
        font-size: 10px;
        color: #666;
        width: 10px;
        flex-shrink: 0;
      }

      .colour-field__range {
        flex: 1;
        accent-color: #4a8fd0;
        cursor: pointer;
      }

      .colour-field__value {
        font-size: 10px;
        color: #888;
        width: 28px;
        text-align: right;
        flex-shrink: 0;
      }

      .colour-rgb {
        font-size: 10px;
        color: #555;
        margin-top: 2px;
      }

      /* ── Used colours ──────────────────────────────────────────── */
      .swatch-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
      }

      .swatch-btn {
        position: relative;
        width: 18px;
        height: 18px;
        border-radius: 2px;
        border: 1px solid rgba(255,255,255,0.1);
        cursor: pointer;
        flex-shrink: 0;
        padding: 0;
      }

      .swatch-btn:hover { border-color: rgba(255,255,255,0.4); transform: scale(1.15); }

      .swatch-btn--active {
        border-color: #fff;
        box-shadow: 0 0 0 2px #4a8fd0;
        transform: scale(1.15);
        z-index: 1;
      }

      .swatch-btn[data-shortcut]::after {
        content: attr(data-shortcut);
        position: absolute;
        top: 0;
        left: 1px;
        font-size: 7px;
        line-height: 1;
        color: rgba(255,255,255,0.75);
        text-shadow: 0 0 3px rgba(0,0,0,0.9);
        pointer-events: none;
      }

      /* ── Mode toggle ─────────────────────────────────────────── */
      .toolbar__btn--mode { opacity: 0.55; }
      .toolbar__btn--mode.is-active { opacity: 1; border-color: #6a9fd8; color: #9fc8f0; }

      /* ── Ruleset grid ────────────────────────────────────────── */
      .ruleset-grid {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        overflow-y: auto;
        background: #141414;
      }

      .ruleset-diamond {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(5, auto);
        gap: 8px;
      }

      .ruleset-separator {
        height: 1px;
        background: #333;
      }

      .ruleset-extras {
        display: flex;
        gap: 8px;
      }

      .config-cell {
        background: #1e1e1e;
        border: 1px solid #2e2e2e;
        border-radius: 4px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
      }

      .config-cell:hover { border-color: #555; }
      .config-cell--assigned { border-color: #4a8fd0; }
      .ruleset-extras .config-cell { flex: 1; }

      .config-cell__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .config-cell__label { font-size: 10px; color: #666; font-weight: bold; }

      .config-cell__unassign {
        background: none;
        border: none;
        color: #555;
        font-size: 11px;
        cursor: pointer;
        padding: 0 3px;
        border-radius: 2px;
        line-height: 1;
      }

      .config-cell__unassign:hover { color: #e06c4a; background: #3a2020; }

      .config-cell__main { display: flex; gap: 8px; align-items: flex-start; }

      /* ── 3×3 neighbour diagram ───────────────────────────────── */
      .config-diagram {
        display: grid;
        grid-template-columns: repeat(3, 10px);
        grid-template-rows: repeat(3, 10px);
        gap: 1px;
        flex-shrink: 0;
      }

      .config-diagram__cell { width: 10px; height: 10px; border-radius: 1px; }
      .config-diagram__cell--corner   { background: #1a1a1a; }
      .config-diagram__cell--center   { background: #4a8fd0; }
      .config-diagram__cell--on       { background: #6aaf60; }
      .config-diagram__cell--off      { background: #2a2a2a; }

      /* ── Variant thumbnail in config cell ────────────────────── */
      .config-cell__thumb-wrap {
        width: 32px;
        height: 32px;
        border: 1px solid #333;
        border-radius: 2px;
        overflow: hidden;
        background-image:
          linear-gradient(45deg, #333 25%, transparent 25%),
          linear-gradient(-45deg, #333 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #333 75%),
          linear-gradient(-45deg, transparent 75%, #333 75%);
        background-size: 6px 6px;
        background-position: 0 0, 0 3px, 3px -3px, -3px 0px;
        background-color: #2a2a2a;
        flex-shrink: 0;
      }

      .config-cell__thumb {
        display: block;
        width: 32px;
        height: 32px;
        image-rendering: pixelated;
      }

      /* ── Flip / mirror controls ──────────────────────────────── */
      .config-cell__controls {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .config-cell__flip-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .config-cell__flip-label { font-size: 10px; color: #666; }

      .config-cell__mirror-select {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #666;
        font-family: inherit;
        font-size: 10px;
        padding: 2px 4px;
        border-radius: 2px;
        width: 100%;
        cursor: pointer;
      }

      .config-cell__mirror-select:hover { border-color: #555; color: #aaa; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span class="toolbar__title">Tile Editor</span>
      <span class="toolbar__sep">|</span>
      <button type="button" id="mode-paint"   class="toolbar__btn toolbar__btn--mode is-active">Paint</button>
      <button type="button" id="mode-ruleset" class="toolbar__btn toolbar__btn--mode">Ruleset</button>
      <span class="toolbar__sep">|</span>
      <button type="button" id="zoom-out"  class="toolbar__btn">−</button>
      <span id="zoom-label" class="toolbar__zoom-label">16×</span>
      <button type="button" id="zoom-in"   class="toolbar__btn">+</button>
      <span class="toolbar__sep">|</span>
      <button type="button" id="fill-btn"  class="toolbar__btn">Fill</button>
    </div>

    <div class="editor-main">
      <!-- Left: terrain type list -->
      <div id="terrain-sidebar" class="terrain-sidebar">
        <div class="sidebar__label">Terrain</div>
        <!-- terrain buttons injected here by JS -->
        <div class="terrain-sidebar__footer">
          <button type="button" id="add-terrain-btn" class="terrain-sidebar__add-btn">+ Add terrain</button>
        </div>
      </div>

      <!-- Center: paint canvas / ruleset grid -->
      <div class="canvas-area">
        <div id="canvas-wrap" class="canvas-wrap">
          <div id="canvas-empty" class="canvas-empty">Select a terrain type to begin painting.</div>
          <canvas id="paint-canvas" class="canvas-wrap__canvas" style="display:none"></canvas>
        </div>
        <div id="ruleset-grid" class="ruleset-grid" style="display:none"></div>
      </div>

      <!-- Right: variants + colour picker + used colours -->
      <div class="right-sidebar">
        <div class="sidebar__section">
          <div class="sidebar__label" style="padding:0 0 6px">Variants</div>
          <div class="frame-actions">
            <button type="button" id="add-frame-btn"    class="frame-action-btn">+ Add</button>
            <button type="button" id="delete-frame-btn" class="frame-action-btn">Delete</button>
          </div>
          <div id="frame-list" class="frame-list"></div>
        </div>

        <div class="sidebar__section">
          <div class="sidebar__label" style="padding:0 0 6px">Colour</div>
          <div id="colour-preview" class="colour-preview" title="Click to open colour picker">
            <input type="color" id="native-colour-picker" class="colour-preview__picker" />
          </div>
          <div class="colour-field">
            <div class="colour-field__row">
              <span class="colour-field__label">L</span>
              <input type="range" id="lch-l" class="colour-field__range" min="0" max="100" step="1" value="70" />
              <span id="lch-l-val" class="colour-field__value">70</span>
            </div>
            <div class="colour-field__row">
              <span class="colour-field__label">C</span>
              <input type="range" id="lch-c" class="colour-field__range" min="0" max="150" step="1" value="40" />
              <span id="lch-c-val" class="colour-field__value">40</span>
            </div>
            <div class="colour-field__row">
              <span class="colour-field__label">H</span>
              <input type="range" id="lch-h" class="colour-field__range" min="0" max="359" step="1" value="200" />
              <span id="lch-h-val" class="colour-field__value">200</span>
            </div>
          </div>
          <div id="colour-rgb" class="colour-rgb"></div>
        </div>

        <div class="sidebar__section">
          <div class="sidebar__label" style="padding:0 0 6px">Used Colours</div>
          <div id="swatch-grid" class="swatch-grid"></div>
        </div>
      </div>
    </div>

    <dialog id="add-terrain-dialog" class="editor-dialog">
      <div class="dialog__header">Add Terrain Type</div>
      <div class="dialog__body">
        <div class="dialog__field">
          <label for="at-id" class="dialog__label">Type ID (slug, immutable)</label>
          <input id="at-id" class="dialog__input" type="text" placeholder="sand" autocomplete="off" spellcheck="false" />
        </div>
        <div class="dialog__field">
          <label for="at-name" class="dialog__label">Display Name</label>
          <input id="at-name" class="dialog__input" type="text" placeholder="Sand" autocomplete="off" />
        </div>
        <div class="dialog__field">
          <label for="at-colour" class="dialog__label">Editor Colour</label>
          <input id="at-colour" class="dialog__input" type="color" value="#888888" />
        </div>
        <div class="dialog__row">
          <input id="at-solid" type="checkbox" />
          <label for="at-solid" class="dialog__label" style="text-transform:none;letter-spacing:0">Solid (blocks movement)</label>
        </div>
        <div id="at-error" class="dialog__error" style="display:none"></div>
      </div>
      <div class="dialog__footer">
        <button type="button" id="at-cancel"  class="dialog__btn">Cancel</button>
        <button type="button" id="at-confirm" class="dialog__btn dialog__btn--primary">Add</button>
      </div>
    </dialog>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
